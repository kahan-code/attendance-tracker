<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Attendance Leave Tracker</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h2>Attendance Leave Tracker</h2>

<label>New Class:</label>
<input id="className" placeholder="Enter class name">

<label>Max Leaves:</label>
<input id="maxLeaves" type="number" placeholder="Enter number">

<button id="addBtn" class="green">Add Class</button>

<hr>

<label>Select Class:</label>
<select id="classDropdown"></select>

<button id="removeBtn" class="red">Remove Class</button>

<div class="editor-box">
<h3>Edit Selected Class</h3>

<label>Edit Class Name:</label>
<input id="editClassName" placeholder="Select a class to edit" disabled>

<label>Edit Max Leaves:</label>
<input id="editMaxLeaves" type="number" placeholder="Enter max leaves" disabled>

<label>Edit Leaves Taken:</label>
<input id="editLeavesTaken" type="number" placeholder="Enter leaves taken" disabled>

<div class="date-editor">
<h4>Manage Leave Dates</h4>

<label>Leave Date:</label>
<input id="leaveDateInput" type="date" disabled>

<button id="saveDateBtn" class="blue" disabled>Add Leave Date</button>
<button id="cancelDateEditBtn" class="gray" disabled>Cancel Date Edit</button>

<div id="dateList" class="date-list"></div>
</div>

<button id="saveClassBtn" class="orange" disabled>Save Class Changes</button>
</div>

<br><br>

<button id="leaveBtn" class="blue">I Left This Class</button>

<br><br>

<button id="showBtn" class="gray">Show Leaves</button>

<br><br>

<button id="resetBtn" class="red">Reset All</button>

<div id="tableArea"></div>

<script type="module" src="app.js"></script>

</body>
</html>
