<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Attendance Leave Tracker</title>
	<link rel="icon" type="image/svg+xml" href="favicon.svg">
	<link rel="manifest" href="manifest.json">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<main class="app-shell">
		<header class="hero">
			<p class="eyebrow">Smart Attendance Dashboard</p>
			<h1>Attendance Leave Tracker</h1>
			<p class="hero-copy">Track classes, log leave dates, and keep your leave balance visible at a glance.</p>
		</header>

		<section class="panel">
			<div class="account-bar">
				<p id="authStateText" class="auth-state">Signed in</p>
				<button id="signOutBtn" class="btn btn-neutral">Log Out</button>
			</div>
		</section>

		<p id="statusBanner" class="status-banner" aria-live="polite"></p>

		<section class="panel panel-grid">
			<article class="card">
				<h2>Add New Class</h2>
				<label for="newClassName">Class Name</label>
				<input id="newClassName" placeholder="Example: Algorithms">

				<label for="newMaxLeaves">Max Leaves</label>
				<input id="newMaxLeaves" type="number" min="1" placeholder="Example: 5">

				<button id="addClassBtn" class="btn btn-primary">Add Class</button>
			</article>

			<article class="card">
				<h2>Class Actions</h2>
				<label for="classSelect">Select Class</label>
				<select id="classSelect"></select>

				<div class="button-row">
					<button id="markLeaveBtn" class="btn btn-accent">I Left This Class</button>
					<button id="removeClassBtn" class="btn btn-danger">Remove Class</button>
				</div>
			</article>
		</section>

		<section class="stats">
			<article class="stat-card">
				<h3>Total Classes</h3>
				<p id="statTotalClasses">0</p>
			</article>
			<article class="stat-card">
				<h3>Total Leaves Taken</h3>
				<p id="statTotalTaken">0</p>
			</article>
			<article class="stat-card">
				<h3>Total Leaves Remaining</h3>
				<p id="statTotalRemaining">0</p>
			</article>
		</section>

		<section class="panel">
			<article class="card">
				<h2>Edit Selected Class</h2>

				<label for="editClassName">Class Name</label>
				<input id="editClassName" placeholder="Select a class" disabled>

				<label for="editMaxLeaves">Max Leaves</label>
				<input id="editMaxLeaves" type="number" min="0" disabled>

				<label for="editLeavesTaken">Leaves Taken</label>
				<input id="editLeavesTaken" type="number" min="0" disabled>

				<button id="saveClassBtn" class="btn btn-warning" disabled>Save Class Changes</button>
			</article>

			<article class="card">
				<h2>Manage Leave Dates</h2>

				<label for="leaveDateInput">Leave Date</label>
				<input id="leaveDateInput" type="date" disabled>

				<div class="button-row">
					<button id="saveDateBtn" class="btn btn-secondary" disabled>Add Leave Date</button>
					<button id="cancelDateEditBtn" class="btn btn-neutral" disabled>Cancel Date Edit</button>
				</div>

				<div id="dateList" class="date-list"></div>
			</article>
		</section>

		<section class="panel">
			<div class="button-row">
				<button id="showTableBtn" class="btn btn-neutral">Show Leaves Table</button>
				<button id="resetAllBtn" class="btn btn-danger">Reset All Classes</button>
			</div>

			<div id="tableWrap" class="table-wrap hidden">
				<div id="tableArea"></div>
			</div>
		</section>
	</main>

	<script type="module" src="app.js"></script>
</body>
</html>
